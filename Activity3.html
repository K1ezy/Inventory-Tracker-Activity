<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printed Keychain Inventory Tracker</title>
    <style>
        /* A basic arrangement so it isn't completely plain */
        body { font-family: sans-serif; padding: 20px; max-width: 600px; }
        .input-group { margin-bottom: 20px; }
        .keychain-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        button { margin-right: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Basic 3D Prints Keychain Inventory Tracker</h1>

    <div class="input-group">
        <input type="text" id="charInput" placeholder="Input an Item">
        <input type="text" id="colorInput" placeholder=" Input it's Filament Color">
        <input type="number" id="priceInput" placeholder="Then it's in Price (PHP)">
        <button id="addBtn">Add to Inventory</button>
    </div>

    <div id="inventory-list"></div>

    <script src="Activity3.js"></script>
</body>
</html>
